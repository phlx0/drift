name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  actions: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.63.4

      - name: Test
        run: go test -race -count=1 ./...

  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # required by goreleaser for changelog

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found" CHANGELOG.md \
            | sed '/^[[:space:]]*$/d' > /tmp/release_notes.md
          echo "--- release notes ---"
          cat /tmp/release_notes.md

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7.2.1
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --release-notes=/tmp/release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Trigger AUR update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run aur.yml \
            --repo ${{ github.repository }} \
            --field tag_name=${{ github.ref_name }}
