version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: drift
    main: .
    binary: drift
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - CONTRIBUTING.md

checksum:
  name_template: "checksums.txt"

brews:
  - name: drift
    repository:
      owner: phlx0
      name: homebrew-drift
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    homepage: "https://github.com/phlx0/drift"
    description: "Terminal screensaver and ambient visualiser"
    license: "MIT"
    install: |
      bin.install "drift"
    test: |
      system "#{bin}/drift", "version"

# Release notes are extracted from CHANGELOG.md by the release workflow.
# See .github/workflows/release.yml
